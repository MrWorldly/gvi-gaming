  );
}


// ─── INBOX TAB ────────────────────────────────────────────────────────────────
function InboxTab({ inbox, config, onGraduate, onDekuSync, results, setResults, phase, setPhase, progress, setProgress }) {
  const FF = "'Inter',sans-serif";
  const FM = "'JetBrains Mono',monospace";

  const [graduating, setGraduating] = useState(false);

  // All games checked by default on mount / when inbox changes
  const [checked, setChecked] = useState(() => {
    const init = {};
    inbox.forEach(g => { init[g.title] = true; });
    return init;
  });
  React.useEffect(() => {
    setChecked(prev => {
      const next = {};
      inbox.forEach(g => { next[g.title] = prev[g.title] !== undefined ? prev[g.title] : true; });
      return next;
    });
  }, [inbox]);

  async function runBatchProjections(){
    if(!inbox.length) return;
    setPhase("running"); setProgress(0); setResults({});
    const batchPrompt = getPrompt(config, "batchProjection", DEFAULT_BATCH_PROMPT) || DEFAULT_BATCH_PROMPT;
    for(let i=0; i<inbox.length; i++){
      const g = inbox[i];
      try{
        const userMsg = `Game: "${g.title}"${g.platform ? ` (${g.platform})` : ""}. What is the projected personal rating for this player?`;
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": lsGet(LS_ANTHROPIC_KEY)||"",
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 50,
            system: batchPrompt,
            messages: [{ role: "user", content: userMsg }]
          })
        });
        const data = await response.json();
        if(data.error) throw new Error(data.error.message||"API error");
        const rawText = data.content?.find(b=>b.type==="text")?.text||"";
        const jsonMatch = rawText.match(/\{[\s\S]*\}/);
        if(!jsonMatch) throw new Error("No JSON in response");
        const parsed = JSON.parse(jsonMatch[0]);
        setResults(prev => ({ ...prev, [g.title]: { projRating: parsed.projectedRating } }));
      } catch(e) {
        setResults(prev => ({ ...prev, [g.title]: { error: e.message } }));
      }
      setProgress(i+1);
    }
    setPhase("done");
  }

  function toggleAll(val){
    const next = {};
    inbox.forEach(g => { next[g.title] = val; });
    setChecked(next);
  }

  async function graduate(){
    setGraduating(true);
    const keep = inbox.filter(g => checked[g.title]);
    const discard = inbox.filter(g => !checked[g.title]);
    const graduated = keep.map(g => {
      const r = results[g.title];
      return { ...g, isStub: false, ...(r && !r.error ? { projRating: r.projRating } : {}) };
    });
    onGraduate(graduated, discard);
    setGraduating(false);
  }

  if(!inbox.length){
    return (
      <div>
        <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:16 }}>
          <Btn variant="ghost" onClick={onDekuSync}>⟳ SYNC DEKU DEALS</Btn>
        </div>
        <div style={{ textAlign:"center", padding:"64px 20px", color:"#475569", fontFamily:FF, fontSize:13 }}>
          Inbox is empty — sync from Deku Deals to populate it.
        </div>
      </div>
    );
  }

  const checkedCount = Object.values(checked).filter(Boolean).length;
  const doneCount = Object.keys(results).length;
  const errCount = Object.values(results).filter(r=>r.error).length;

  return (
    <div>
      {/* Header bar */}
      <div style={{ display:"flex", gap:10, marginBottom:16, alignItems:"center", flexWrap:"wrap" }}>
        <div style={{ display:"flex", gap:8, flex:1, flexWrap:"wrap" }}>
          {[
            ["INBOX", inbox.length, "#94a3b8"],
            phase==="done" && ["PROJECTED", doneCount-errCount, "#4ade80"],
            phase==="done" && errCount>0 && ["ERRORS", errCount, "#f87171"],
            phase==="done" && ["CHECKED", checkedCount, "#a78bfa"],
          ].filter(Boolean).map(([l,v,c]) => (
            <div key={l} style={{ background:"#0a1628", border:"1px solid #1e293b", borderRadius:4, padding:"6px 12px" }}>
              <div style={{ fontSize:9, letterSpacing:1.5, color:"#64748b", fontFamily:FM }}>{l}</div>
              <div style={{ fontSize:16, fontWeight:700, color:c, fontFamily:FM }}>{v}</div>
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
          <Btn variant="ghost" onClick={onDekuSync}>⟳ SYNC DEKU DEALS</Btn>
          <Btn variant="ghost" size="sm" onClick={()=>toggleAll(true)}>CHECK ALL</Btn>
          <Btn variant="ghost" size="sm" onClick={()=>toggleAll(false)}>UNCHECK ALL</Btn>
          {phase === "idle" && (
            <Btn variant="warn" onClick={runBatchProjections} disabled={!inbox.length}>✦ RUN BATCH PROJECTIONS</Btn>
          )}
          {phase === "running" && (
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ fontFamily:FM, fontSize:11, color:"#facc15" }}>
                PROJECTING {progress}/{inbox.length}…
              </div>
              <div style={{ width:120, height:4, background:"#1e293b", borderRadius:2, overflow:"hidden" }}>
                <div style={{ height:"100%", width:`${(progress/inbox.length)*100}%`,
                  background:"#a78bfa", transition:"width 0.3s ease" }}/>
              </div>
            </div>
          )}
          {phase === "done" && (
            <Btn variant="warn" size="sm" onClick={runBatchProjections}>↺ RE-RUN</Btn>
          )}
          <Btn variant="success" onClick={graduate} disabled={graduating||checkedCount===0}>
            {graduating ? "MOVING…" : `MOVE ${checkedCount} TO WISHLIST`}
          </Btn>
          {checkedCount === 0 && (
            <Btn variant="danger" onClick={()=>{ if(window.confirm(`Delete all ${inbox.length} inbox games permanently?`)) onGraduate([],[...inbox]); }}>
              CLEAR INBOX
            </Btn>
          )}
        </div>
      </div>

      {/* Table */}
      <div style={{ background:"#0a1628", border:"1px solid #1e293b", borderRadius:4, overflow:"hidden" }}>
        {/* Header */}
        <div style={{ display:"grid", gridTemplateColumns:"32px 1fr 90px 80px 100px 36px",
          gap:0, padding:"6px 12px", borderBottom:"1px solid #1e293b",
          fontSize:9, letterSpacing:1.5, color:"#475569", fontFamily:FM, fontWeight:700 }}>
          <div/>
          <div>TITLE</div>
          <div>PLATFORM</div>
          <div style={{textAlign:"right"}}>TARGET $</div>
          <div style={{textAlign:"right"}}>PROJ RATING</div>
          <div/>
        </div>

        {/* Rows */}
        {inbox.map((g, idx) => {
          const res = results[g.title];
          const isChecked = !!checked[g.title];
          const hasResult = !!res && !res.error;
          const hasError = res?.error;

          return (
            <div key={g.title} style={{
              display:"grid", gridTemplateColumns:"32px 1fr 90px 80px 100px 36px",
              gap:0, padding:"9px 12px",
              borderBottom: idx < inbox.length-1 ? "1px solid #0f172a" : "none",
              background: isChecked ? "transparent" : "#060e1e",
              opacity: isChecked ? 1 : 0.45,
              transition:"all 0.15s", alignItems:"center",
            }}>
              {/* Checkbox */}
              <div>
                <input type="checkbox" checked={isChecked}
                  onChange={e => setChecked(prev => ({...prev, [g.title]: e.target.checked}))}
                  style={{ accentColor:"#7c3aed", width:14, height:14, cursor:"pointer" }}/>
              </div>

              {/* Title */}
              <div style={{ fontSize:12, fontWeight:600, color:"#e2e8f0", fontFamily:FF,
                overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", paddingRight:8 }}>
                {g.title}
              </div>

              {/* Platform */}
              <div style={{ fontSize:11, color:"#64748b", fontFamily:FM }}>
                {g.platform || <span style={{color:"#334155"}}>—</span>}
              </div>

              {/* Target $ */}
              <div style={{ fontSize:11, color:"#facc15", fontFamily:FM, textAlign:"right" }}>
                {g.targetPrice != null ? `$${parseFloat(g.targetPrice).toFixed(2)}` : <span style={{color:"#334155"}}>—</span>}
              </div>

              {/* Proj Rating */}
              <div style={{ textAlign:"right", fontFamily:FM, fontSize:12, fontWeight:700 }}>
                {hasResult && (
                  <span style={{ color: gviColor(res.projRating/10) }}>{res.projRating?.toFixed(1)}</span>
                )}
                {hasError && <span style={{ color:"#f87171", fontSize:9 }}>ERR</span>}
                {phase==="running" && !res && (
                  <span style={{ color:"#334155", fontSize:9 }}>…</span>
                )}
                {phase!=="running" && !res && <span style={{color:"#334155"}}>—</span>}
              </div>

              {/* Deku link */}
              <div style={{ textAlign:"center" }}>
                {g.dekuLink
                  ? <a href={g.dekuLink} target="_blank" rel="noreferrer" onClick={e=>e.stopPropagation()}
                      style={{ color:"#475569", fontSize:13, textDecoration:"none" }} title="Open on Deku Deals">↗</a>
                  : <span style={{ color:"#1e293b", fontSize:13 }}>↗</span>
                }
              </div>
            </div>
          );
        })}
      </div>

      {phase === "done" && (
        <div style={{ marginTop:12, padding:"8px 12px", background:"#0a1628", border:"1px solid #1e293b",
          borderRadius:3, fontSize:10, color:"#64748b", fontFamily:FF }}>
          Checked games move to Wishlist with full projection data. Unchecked games are deleted from Inbox permanently — remove them from Deku Deals first.
        </div>
      )}
    </div>
  );
}

// ─── DATA GAPS TAB ────────────────────────────────────────────────────────────
function DataGapsTab({ owned, wishlist, onSaveOwned, onSaveWishlist, onProject }) {
  const FF = "'Inter',sans-serif";
  const FM = "'JetBrains Mono',monospace";

  // Compute gaps
  const ownedGaps = owned
    .filter(g => {
      const needsProj = (g.status === "In Progress" || g.status === "Not Started") && !g.projRating;
      const needsNote = !g.notes?.trim();
      const needsHours = (g.status === "In Progress" || g.status === "Not Started") && !g.estHours;
      return needsProj || needsNote || needsHours;
    })
    .map(g => ({
      ...g,
      _source: "owned",
      _missing: [
        ((g.status === "In Progress" || g.status === "Not Started") && !g.projRating) && "PROJ RATING",
        !g.notes?.trim() && "NOTE",
        ((g.status === "In Progress" || g.status === "Not Started") && !g.estHours) && "EST HOURS",
      ].filter(Boolean),
    }));

  const wishlistGaps = wishlist
    .filter(g => !g.projRating || !g.notes?.trim() || !g.targetPrice || !g.platform)
    .map(g => ({
      ...g,
      _source: "wishlist",
      _missing: [
        !g.projRating && "PROJ RATING",
        !g.notes?.trim() && "NOTE",
        !g.targetPrice && "TARGET $",
        !g.platform && "PLATFORM",
      ].filter(Boolean),
    }));

  const total = ownedGaps.length + wishlistGaps.length;

  const MISS_COLORS = {
    "PROJ RATING": "#a78bfa",
    "NOTE": "#fb923c",
    "EST HOURS": "#facc15",
    "TARGET $": "#38bdf8",
    "PLATFORM": "#f472b6",
  };

  if (total === 0) {
    return (
      <div style={{ textAlign:"center", padding:"64px 20px", color:"#4ade80", fontFamily:FF, fontSize:13 }}>
        ✓ No data gaps — all fields complete.
      </div>
    );
  }

  return (
    <div>
      {/* Summary bar */}
      <div style={{ display:"flex", gap:10, marginBottom:16, flexWrap:"wrap" }}>
        {[
          ["TOTAL GAPS", total, "#f87171"],
          ["OWNED", ownedGaps.length, "#94a3b8"],
          ["WISHLIST", wishlistGaps.length, "#94a3b8"],

function GapSection({ title, games, source, onSave, onProject, missColors }) {
  const FF = "'Inter',sans-serif";
  const FM = "'JetBrains Mono',monospace";
  return (
    <div style={{ marginBottom:24 }}>
      <div style={{ fontSize:9, letterSpacing:2, color:"#64748b", fontFamily:FM, fontWeight:700, marginBottom:8 }}>
        {title} — {games.length} GAME{games.length !== 1 ? "S" : ""}
      </div>
      <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
        {games.map(g => (
          <GapRow key={g.title} g={g} source={source} onSave={onSave} onProject={onProject} missColors={missColors} />
        ))}
      </div>
    </div>
  );
}

function GapRow({ g, source, onSave, onProject, missColors }) {
  const FF = "'Inter',sans-serif";
  const FM = "'JetBrains Mono',monospace";
  const [expanded, setExpanded] = React.useState(false);
  const [noteVal, setNoteVal] = React.useState(g.notes || "");
  const [estHoursVal, setEstHoursVal] = React.useState(g.estHours?.toString() || "");
  const [targetPriceVal, setTargetPriceVal] = React.useState(g.targetPrice?.toString() || "");
  const [platformVal, setPlatformVal] = React.useState(g.platform || "");
  const [saving, setSaving] = React.useState(false);

  // Re-sync if parent updates
  React.useEffect(() => {
    setNoteVal(g.notes || "");
    setEstHoursVal(g.estHours?.toString() || "");
    setTargetPriceVal(g.targetPrice?.toString() || "");
    setPlatformVal(g.platform || "");
  }, [g]);

  function save() {
    setSaving(true);
    const updates = { notes: noteVal };
    if (source === "owned" && estHoursVal) updates.estHours = parseFloat(estHoursVal);
    if (source === "wishlist") {
      if (targetPriceVal) updates.targetPrice = parseFloat(targetPriceVal);
      if (platformVal) updates.platform = platformVal;
    }
    onSave(g.title, updates);
    setTimeout(() => { setSaving(false); setExpanded(false); }, 400);
  }

  const hasMissing = f => g._missing.includes(f);

  return (
    <div style={{ background:"#0a1628", border:"1px solid #1e293b", borderRadius:3, overflow:"hidden" }}>
      {/* Row header */}
      <div style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 12px", cursor:"pointer" }}
        onClick={() => setExpanded(e => !e)}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ fontSize:12, fontWeight:600, color:"#e2e8f0", fontFamily:FF,
            overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{g.title}</div>
          <div style={{ display:"flex", gap:4, marginTop:3, flexWrap:"wrap" }}>
            {g.platform && <span style={{ fontSize:9, color:"#64748b", fontFamily:FM }}>{g.platform}</span>}
            {g.status && <span style={{ fontSize:9, color:STATUS_COLORS[g.status]||"#64748b", fontFamily:FM }}>{g.status?.toUpperCase()}</span>}
          </div>
        </div>
        {/* Missing tags */}
        <div style={{ display:"flex", gap:4, flexWrap:"wrap", justifyContent:"flex-end" }}>
          {g._missing.map(m => (
            <span key={m} style={{ fontSize:9, fontFamily:FM, fontWeight:700, letterSpacing:0.3,
              color:missColors[m], background:missColors[m]+"18", padding:"2px 6px", borderRadius:2,
              border:`1px solid ${missColors[m]}44` }}>{m}</span>
          ))}
        </div>
        {/* Projection button */}
        <Btn size="sm" variant="warn" onClick={e => { e.stopPropagation(); onProject(g, source); }}>✦ PROJ</Btn>
        {/* Expand chevron */}
        <span style={{ color:"#475569", fontSize:11, userSelect:"none" }}>{expanded ? "▲" : "▼"}</span>
      </div>

      {/* Expanded edit panel */}
      {expanded && (
        <div style={{ padding:"10px 12px 12px", borderTop:"1px solid #1e293b", display:"flex", flexDirection:"column", gap:10 }}>
          {/* Row 1: numeric fields */}
          <div style={{ display:"flex", gap:10, flexWrap:"wrap" }}>
            {source === "owned" && (
              <div style={{ minWidth:120 }}>
                <div style={{ fontSize:9, letterSpacing:1, color: hasMissing("EST HOURS") ? "#facc15" : "#64748b",
                  fontFamily:FM, marginBottom:3 }}>EST HOURS {hasMissing("EST HOURS") && "⚠"}</div>
                <input type="number" value={estHoursVal} onChange={e => setEstHoursVal(e.target.value)}
                  placeholder="e.g. 40" min={1} step={1}
                  style={{ width:"100%", boxSizing:"border-box", background:"#060e1e", border:`1px solid ${hasMissing("EST HOURS")?"#facc1566":"#334155"}`,
                    borderRadius:3, padding:"5px 8px", color:"#e2e8f0", fontFamily:FM, fontSize:12, outline:"none" }}/>
              </div>
            )}
            {source === "wishlist" && (
              <>
                <div style={{ minWidth:120 }}>
                  <div style={{ fontSize:9, letterSpacing:1, color: hasMissing("TARGET $") ? "#38bdf8" : "#64748b",
                    fontFamily:FM, marginBottom:3 }}>TARGET $ {hasMissing("TARGET $") && "⚠"}</div>
                  <input type="number" value={targetPriceVal} onChange={e => setTargetPriceVal(e.target.value)}
                    placeholder="e.g. 19.99" min={0} step={0.01}
                    style={{ width:"100%", boxSizing:"border-box", background:"#060e1e", border:`1px solid ${hasMissing("TARGET $")?"#38bdf866":"#334155"}`,
                      borderRadius:3, padding:"5px 8px", color:"#e2e8f0", fontFamily:FM, fontSize:12, outline:"none" }}/>
                </div>
                <div style={{ minWidth:140 }}>
                  <div style={{ fontSize:9, letterSpacing:1, color: hasMissing("PLATFORM") ? "#f472b6" : "#64748b",
                    fontFamily:FM, marginBottom:3 }}>PLATFORM {hasMissing("PLATFORM") && "⚠"}</div>
                  <select value={platformVal} onChange={e => setPlatformVal(e.target.value)}
                    style={{ width:"100%", background:"#060e1e", border:`1px solid ${hasMissing("PLATFORM")?"#f472b666":"#334155"}`,
                      borderRadius:3, padding:"5px 8px", color: platformVal ? "#e2e8f0" : "#475569",
                      fontFamily:FM, fontSize:12, outline:"none" }}>
                    <option value="">— select —</option>
                    {VALID_PLATFORMS.map(p => <option key={p} value={p}>{p}</option>)}
                  </select>
                </div>
              </>
            )}
          </div>

          {/* Note */}
          <div>
            <div style={{ fontSize:9, letterSpacing:1, color: hasMissing("NOTE") ? "#fb923c" : "#64748b",
              fontFamily:FM, marginBottom:3 }}>NOTE {hasMissing("NOTE") && "⚠"}</div>
            <textarea value={noteVal} onChange={e => setNoteVal(e.target.value)} rows={3}
              placeholder="Enjoyment note…"
              style={{ width:"100%", boxSizing:"border-box", background:"#060e1e",
                border:`1px solid ${hasMissing("NOTE")?"#fb923c66":"#334155"}`,
                borderRadius:3, padding:"6px 8px", color:"#e2e8f0", fontFamily:FF,
                fontSize:11, lineHeight:1.5, resize:"vertical", outline:"none" }}/>
          </div>

          {/* Save */}
          <div style={{ display:"flex", gap:6, justifyContent:"flex-end" }}>
            <Btn size="sm" variant="ghost" onClick={() => setExpanded(false)}>CANCEL</Btn>
            <Btn size="sm" variant="success" onClick={save} disabled={saving}>{saving ? "SAVING…" : "SAVE"}</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

function StatsBar({owned,wishlist,onKpiClick}){
  const completed=owned.filter(g=>g.status==="Completed");
  const inProgress=owned.filter(g=>g.status==="In Progress");
  const avgGVI=completed.filter(g=>g.actualGVI).reduce((s,g,_,a)=>s+g.actualGVI/a.length,0)||0;
  const avgRating=completed.filter(g=>g.personalRating).reduce((s,g,_,a)=>s+g.personalRating/a.length,0)||0;
  const stats=[
    {label:"OWNED",val:owned.length,color:"#a78bfa",action:"owned"},
    {label:"COMPLETED",val:completed.length,color:"#4ade80",action:"completed"},
    {label:"IN PROGRESS",val:inProgress.length,color:"#facc15",action:"inprogress"},
    {label:"WISHLIST",val:wishlist.length,color:"#94a3b8",action:"wishlist"},
    {label:"AVG GVI",val:avgGVI?avgGVI.toFixed(3):"—",color:gviColor(avgGVI),action:null},
    {label:"AVG RATING",val:avgRating?avgRating.toFixed(2):"—",color:avgRating>=8?"#a78bfa":"#4ade80",action:null},
  ];
  return(
    <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:16}}>
      {stats.map(({label,val,color,action})=>(
        <div key={label}
          onClick={action?()=>onKpiClick(action):undefined}
          style={{background:"#0a1628",border:`1px solid ${action?"#334155":"#1e293b"}`,borderRadius:4,padding:"11px 13px",cursor:action?"pointer":"default",transition:action?"border-color 0.15s":"none"}}
          onMouseEnter={action?e=>{e.currentTarget.style.borderColor="#7c3aed";}:undefined}
          onMouseLeave={action?e=>{e.currentTarget.style.borderColor="#334155";}:undefined}
        >
          <div style={{fontSize:9,letterSpacing:1,fontFamily:"'Inter',sans-serif",fontWeight:600,color:"#94a3b8",marginBottom:3}}>{label}</div>
          <div style={{fontSize:19,fontWeight:700,color}}>{val}</div>
        </div>
      ))}
    </div>
  );
}

function DataModal({owned,wishlist,onImport,onClose}){
  const[tab,setTab]=useState("export");
  const[importText,setImportText]=useState("");
  const[importError,setImportError]=useState(null);
  const[importPreview,setImportPreview]=useState(null);
  const[resetConfirm,setResetConfirm]=useState("");
  const[resetDone,setResetDone]=useState(false);

  const[exportStatus,setExportStatus]=useState(null); // null | "copied" | "error"

  // Export — data URI approach (blob download blocked in artifact sandbox)
  function doExport(){
    const payload={
      exportedAt:new Date().toISOString(),
      version:"gvi-v1",
      owned,
      wishlist,
    };
    const json=JSON.stringify(payload,null,2);
    // Try clipboard first (works in sandbox)
    if(navigator.clipboard?.writeText){
      navigator.clipboard.writeText(json)
        .then(()=>setExportStatus("copied"))
        .catch(()=>setExportStatus("error"));
    } else {
      setExportStatus("error");
    }
  }

  // Parse pasted or will-be-uploaded import text
  function parseImport(){
    setImportError(null);setImportPreview(null);
    try{
      const parsed=JSON.parse(importText.trim());
      // Accept either full export format or bare {owned,wishlist}
      const o=parsed.owned||parsed.games; // games = legacy key
      const w=parsed.wishlist;
      if(!Array.isArray(o)||!Array.isArray(w)) throw new Error("Expected 'owned' and 'wishlist' arrays");
      setImportPreview({owned:o,wishlist:w,exportedAt:parsed.exportedAt||"unknown"});
    }catch(e){
      setImportError("Invalid JSON: "+e.message);
    }
  }

  function handleFileUpload(e){
    const file=e.target.files?.[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{setImportText(ev.target.result||"");};
    reader.readAsText(file);
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(6,14,30,0.94)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      <div style={{background:"#0a1628",border:"1px solid #334155",borderRadius:6,padding:24,width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto",animation:"fadeIn 0.2s ease"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontSize:13,fontWeight:700,letterSpacing:1,color:"#f1f5f9"}}>DATA MANAGEMENT</div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:20}}>×</button>
        </div>

        <TabBar
          tabs={[{key:"export",label:"EXPORT"},{key:"import",label:"IMPORT"},{key:"reset",label:"RESET"}]}
          active={tab}
          onChange={setTab}
        />

        {tab==="export"&&(
          <div>
            <div style={{marginBottom:14,padding:"12px 14px",background:"#060e1e",borderRadius:3,border:"1px solid #1e293b",fontSize:11,color:"#64748b",lineHeight:1.6}}>
              Copies your complete library JSON to clipboard. Paste it into a <span style={{color:"#a78bfa"}}>.json file</span> (Notepad, TextEdit, etc.) and save it somewhere safe. This is your recovery option if storage is cleared.
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {[["OWNED GAMES",owned.length,"#4ade80"],["WISHLIST ITEMS",wishlist.length,"#94a3b8"],["COMPLETED",owned.filter(g=>g.status==="Completed").length,"#a78bfa"],["IN PROGRESS",owned.filter(g=>g.status==="In Progress").length,"#facc15"]].map(([l,v,c])=>(
                <div key={l} style={{background:"#060e1e",borderRadius:3,padding:"10px 14px"}}>
                  <div style={{fontSize:9,letterSpacing:1.5,color:"#94a3b8",marginBottom:3}}>{l}</div>
                  <div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div>
                </div>
              ))}
            </div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:9,color:"#a78bfa",letterSpacing:1,marginBottom:6}}>▼ CLICK BOX TO SELECT ALL — then Ctrl+C / Cmd+C — paste into a .json file and save</div>
              <textarea readOnly value={JSON.stringify({exportedAt:new Date().toISOString(),version:"gvi-v1",owned,wishlist},null,2)}
                onClick={e=>e.target.select()}
                onFocus={e=>e.target.select()}
                style={{width:"100%",height:140,background:"#060e1e",border:"1px solid #7c3aed44",borderRadius:3,padding:"6px 8px",color:"#94a3b8",fontFamily:"monospace",fontSize:9,resize:"vertical",outline:"none",boxSizing:"border-box",cursor:"text"}}
              />
            </div>
          </div>
        )}

        {/* IMPORT TAB */}
        {tab==="import"&&(
          <div>
            <div style={{marginBottom:14,padding:"10px 12px",background:"rgba(250,204,21,0.06)",borderRadius:3,border:"1px solid #facc1533",fontSize:11,color:"#facc15",lineHeight:1.6}}>
              ⚠ Import <strong>replaces</strong> current data. Export first if you want to preserve what's here.
            </div>

            {/* File upload */}
            <div style={{marginBottom:10}}>
              <Lbl>UPLOAD BACKUP FILE</Lbl>
              <input type="file" accept=".json" onChange={handleFileUpload}
                style={{width:"100%",padding:"6px 8px",background:"#1e293b",border:"1px solid #334155",borderRadius:3,color:"#94a3b8",fontFamily:"monospace",fontSize:11,cursor:"pointer"}}/>
            </div>

            <div style={{textAlign:"center",fontSize:9,color:"#334155",margin:"8px 0"}}>— OR PASTE JSON —</div>

            <div style={{marginBottom:10}}>
              <Lbl>PASTE BACKUP JSON</Lbl>
              <textarea value={importText} onChange={e=>setImportText(e.target.value)}
                style={{width:"100%",height:100,background:"#1e293b",border:"1px solid #334155",borderRadius:3,padding:"6px 8px",color:"#94a3b8",fontFamily:"monospace",fontSize:10,resize:"vertical",outline:"none",boxSizing:"border-box"}}
                placeholder={"{\"owned\":[...],\"wishlist\":[...]}"}/>
            </div>

            {importError&&<div style={{marginBottom:10,padding:"8px 10px",background:"rgba(248,113,113,0.1)",border:"1px solid #f87171",borderRadius:3,fontSize:11,color:"#f87171"}}>{importError}</div>}

            {importPreview&&(
              <div style={{marginBottom:14,padding:"10px 12px",background:"rgba(74,222,128,0.06)",borderRadius:3,border:"1px solid #4ade8033",fontSize:11,color:"#4ade80",lineHeight:1.8}}>
                ✓ Valid backup detected<br/>
                <span style={{color:"#64748b"}}>Exported: {importPreview.exportedAt}</span><br/>
                {importPreview.owned.length} owned games · {importPreview.wishlist.length} wishlist items
              </div>
            )}

            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              {!importPreview&&<Btn variant="ghost" onClick={parseImport}>PARSE</Btn>}
              {importPreview&&<Btn variant="success" onClick={()=>onImport(importPreview.owned,importPreview.wishlist)}>RESTORE FROM BACKUP</Btn>}
            </div>
          </div>
        )}

        {/* RESET TAB */}
        {tab==="reset"&&(
          <div>
            {!resetDone?(
              <>
                <div style={{marginBottom:14,padding:"12px 14px",background:"rgba(248,113,113,0.08)",borderRadius:3,border:"1px solid #f8717133",fontSize:11,color:"#f87171",lineHeight:1.6}}>
                  ⚠ This wipes all owned and wishlist data and reloads from seed. This cannot be undone. Export first.
                </div>
                <div style={{marginBottom:14}}>
                  <Lbl>TYPE "RESET" TO CONFIRM</Lbl>
                  <Inp value={resetConfirm} onChange={setResetConfirm} placeholder="RESET"/>
                </div>
                <Btn variant="danger" disabled={resetConfirm!=="RESET"} onClick={()=>setResetDone(true)}>WIPE AND RELOAD SEED DATA</Btn>
              </>
            ):(
              <div style={{textAlign:"center",padding:"20px 0"}}>
                <div style={{fontSize:11,color:"#f87171",marginBottom:16,letterSpacing:1}}>ARE YOU ABSOLUTELY SURE?</div>
                <div style={{display:"flex",gap:10,justifyContent:"center"}}>
                  <Btn variant="ghost" onClick={()=>{setResetDone(false);setResetConfirm("");}}>CANCEL</Btn>
                  <Btn variant="danger" onClick={()=>onImport([],[])}>YES — WIPE EVERYTHING</Btn>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── GIST SYNC INFRASTRUCTURE ────────────────────────────────────────────────
const GIST_ID = "4c0053356a06460c57e3e54dd83b4f2b";
const GIST_FILENAME = "gvi-library.json";
const GIST_RAW = `https://gist.githubusercontent.com/MrWorldly/${GIST_ID}/raw/${GIST_FILENAME}`;
const GIST_API = `https://api.github.com/gists/${GIST_ID}`;
const CONFIG_GIST_ID = "1aa50497c83c2bc837e7288bcb259121";
const CONFIG_FILENAME = "prompts.json";
const CONFIG_GIST_RAW = `https://gist.githubusercontent.com/MrWorldly/${CONFIG_GIST_ID}/raw/${CONFIG_FILENAME}`;
const CONFIG_GIST_API = `https://api.github.com/gists/${CONFIG_GIST_ID}`;
const LS_CONFIG_KEY = "gvi-config-v1";
// (LS_GIST_TOKEN, LS_ANTHROPIC_KEY, lsGet, lsSet, lsDel defined at top of file)

async function fetchFromGist(){
  const r = await fetch(`${GIST_RAW}?cb=${Date.now()}`);
  if(!r.ok) throw new Error(`Gist fetch failed: ${r.status}`);
  const d = await r.json();
  return { owned: d.owned || d.games || [], wishlist: d.wishlist || [], inbox: d.inbox || [] };
}

async function pushToGist(token, owned, wishlist, inbox=[]){
  const body = JSON.stringify({ exportedAt: new Date().toISOString(), version: "gvi-v1", owned, wishlist, inbox });
  const r = await fetch(GIST_API, {
    method: "PATCH",
    headers: {
      "Authorization": `token ${token}`,
      "Content-Type": "application/json",
      "Accept": "application/vnd.github.v3+json",
    },
    body: JSON.stringify({ files: { [GIST_FILENAME]: { content: body } } }),
  });
  if(!r.ok){
    const e = await r.json().catch(()=>({}));
    throw new Error(`GitHub ${r.status}: ${e.message || r.statusText}`);
  }
}

async function fetchFromConfigGist(){
  const r = await fetch(`${CONFIG_GIST_RAW}?cb=${Date.now()}`);
  if(!r.ok) throw new Error(`Config Gist fetch failed: ${r.status}`);
  const text = await r.text();
  try{ return JSON.parse(text); }catch{ return {}; }
}

async function pushToConfigGist(token, config){
  const r = await fetch(CONFIG_GIST_API, {
    method: "PATCH",
    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json", "Accept": "application/vnd.github.v3+json" },
    body: JSON.stringify({ files: { [CONFIG_FILENAME]: { content: JSON.stringify(config, null, 2) } } }),
  });
  if(!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(`GitHub ${r.status}: ${e.message || r.statusText}`); }
}

function saveLocalConfig(config){
  lsSet(LS_CONFIG_KEY, JSON.stringify(config));
}

function loadLocalConfig(){
  try{ const v = lsGet(LS_CONFIG_KEY); return v ? JSON.parse(v) : null; }catch{ return null; }
}

function saveLocal(owned, wishlist, inbox=[]){
  const ts = new Date().toISOString();
  lsSet(OWNED_KEY, JSON.stringify({ games: owned, lastSaved: ts }));
  lsSet(WISHLIST_KEY, JSON.stringify({ games: wishlist, lastSaved: ts }));
  lsSet(INBOX_KEY, JSON.stringify({ games: inbox, lastSaved: ts }));
}

function loadLocal(){
  try{
    const o = lsGet(OWNED_KEY), w = lsGet(WISHLIST_KEY), i = lsGet(INBOX_KEY);
    if(o && w){
      const op = JSON.parse(o), wp = JSON.parse(w);
      const ip = i ? JSON.parse(i) : { games: [] };
      return { owned: op.games, wishlist: wp.games, inbox: ip.games||[], lastSaved: op.lastSaved };
    }
  }catch{}
  return null;
}

function SetupScreen({ onComplete }){
  const [gt, setGt] = useState("");
  const [ak, setAk] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);

  async function go(){
    if(!gt.trim()){ setErr("GitHub token required."); return; }
    if(!ak.trim()){ setErr("Anthropic API key required."); return; }
    setBusy(true); setErr(null);
    try{
      const r = await fetch(GIST_API, { headers: { "Authorization": `token ${gt.trim()}`, "Accept": "application/vnd.github.v3+json" } });
      if(!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(e.message || r.status); }
      lsSet(LS_GIST_TOKEN, gt.trim());
      lsSet(LS_ANTHROPIC_KEY, ak.trim());
      // Initialize config Gist with default prompts if empty
      try{
        const existing = await fetchFromConfigGist().catch(()=>({}));
        if(!existing || Object.keys(existing).length===0){
          const defaultConfig = {
            projection: DEFAULT_PROJECTION_PROMPT,
            batchProjection: DEFAULT_BATCH_PROMPT,
            reports: [
              {id:"weekly", name:"Weekly Report", prompt: DEFAULT_WEEKLY_PROMPT},
            ]
          };
          await pushToConfigGist(gt.trim(), defaultConfig);
          saveLocalConfig(defaultConfig);
        }
      }catch(e){ console.warn("Config init failed:", e.message); }
      onComplete();
    }catch(e){ setErr("Failed: " + e.message); }
    finally{ setBusy(false); }
  }

  const I = { width:"100%", boxSizing:"border-box", background:"#1e293b", border:"1px solid #334155", borderRadius:3, padding:"8px 10px", color:"#e2e8f0", fontFamily:"monospace", fontSize:12, outline:"none", marginTop:4 };
  const L = { fontFamily:"monospace", fontSize:10, letterSpacing:1.5, color:"#64748b", display:"block", marginBottom:2 };

  return (
    <div style={{ minHeight:"100vh", background:"#060e1e", display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
      <div style={{ width:"100%", maxWidth:500, background:"#0a1628", border:"1px solid rgba(124,58,237,0.27)", borderRadius:6, padding:32 }}>
        <div style={{ fontSize:9, letterSpacing:4, color:"#7c3aed", marginBottom:4 }}>GAME VALUE INDEX</div>
        <div style={{ fontSize:20, fontWeight:700, color:"#f1f5f9", marginBottom:4, fontFamily:"monospace" }}>LIBRARY TRACKER</div>
        <div style={{ fontSize:10, color:"#475569", letterSpacing:1, marginBottom:28, fontFamily:"monospace" }}>FIRST-TIME DEVICE SETUP</div>

        <div style={{ marginBottom:16 }}>
          <label style={L}>GITHUB TOKEN (classic, gist scope)</label>
          <div style={{ fontSize:9, color:"#334155", marginBottom:4, fontFamily:"monospace" }}>github.com → Settings → Developer Settings → Personal Access Tokens (classic)</div>
          <input type="password" value={gt} onChange={e=>setGt(e.target.value)} placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" style={I}/>
        </div>

        <div style={{ marginBottom:20 }}>
          <label style={L}>ANTHROPIC API KEY</label>
          <div style={{ fontSize:9, color:"#334155", marginBottom:4, fontFamily:"monospace" }}>console.anthropic.com → API Keys</div>
          <input type="password" value={ak} onChange={e=>setAk(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="sk-ant-xxxxxxxxxxxxxxxxxxxx" style={I}/>
        </div>

        {err && <div style={{ marginBottom:14, padding:"8px 10px", background:"rgba(248,113,113,0.1)", border:"1px solid #f87171", borderRadius:3, fontSize:11, color:"#f87171", fontFamily:"monospace" }}>{err}</div>}

        <button onClick={go} disabled={busy||!gt.trim()||!ak.trim()} style={{ width:"100%", padding:"10px", borderRadius:3, cursor:busy?"wait":"pointer", fontSize:11, fontFamily:"monospace", letterSpacing:1.5, background:"#7c3aed", border:"none", color:"#fff", opacity:busy||!gt.trim()||!ak.trim()?0.5:1 }}>
          {busy ? "… VERIFYING" : "CONNECT & SYNC"}
        </button>
      </div>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const [owned, setOwned] = useState([]);
  const [wishlist, setWishlist] = useState([]);
  const [inbox, setInbox] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | saving | error | offline
  const [lastSynced, setLastSynced] = useState(null);
  const [toast, setToast] = useState(null);
  const [tab, setTab] = useState("owned");
  const [ownedSortKey,  setOwnedSortKey]  = useState("personalRating");
  const [ownedSortDir,  setOwnedSortDir]  = useState("desc");
  const [ownedFilter,   setOwnedFilter]   = useState("All");
  const [wishSortKey,   setWishSortKey]   = useState("projGVI");
  const [wishSortDir,   setWishSortDir]   = useState("desc");
  const [selectedOwned, setSelectedOwned] = useState(null);
  const [selectedWish, setSelectedWish] = useState(null);
  const [scoreModal, setScoreModal] = useState(null);
  const [startedModal, setStartedModal] = useState(null);
  const [addWishModal, setAddWishModal] = useState(false);
  const [dekuModal, setDekuModal] = useState(false);
  const [projectionModal, setProjectionModal] = useState(null);
  const [dataModal, setDataModal] = useState(false);
  const [batchRatingModal, setBatchRatingModal] = useState(false);
  const [autoTagModal, setAutoTagModal] = useState(false);
  const [needsSetup, setNeedsSetup] = useState(false);
  const [config, setConfig] = useState(null);
  const [configModal, setConfigModal] = useState(false);
  const [inboxResults, setInboxResults] = useState({});
  const [inboxPhase, setInboxPhase] = useState("idle");
  const [inboxProgress, setInboxProgress] = useState(0);

  const showToast = (msg, type="success") => { setToast({msg,type}); setTimeout(()=>setToast(null), 4000); };

  useEffect(()=>{
    if(!lsGet(LS_GIST_TOKEN) || !lsGet(LS_ANTHROPIC_KEY)){
      setNeedsSetup(true); setLoading(false); return;
    }
    boot();
  }, []);

  async function boot(){
    setLoading(true);
    try{
      const [libData, cfgData] = await Promise.all([
        fetchFromGist(),
        fetchFromConfigGist().catch(()=>null),
      ]);
      const { owned: o, wishlist: w, inbox: ib } = libData;
      setOwned(o); setWishlist(w); setInbox(ib||[]);
      setLastSynced(new Date().toISOString());
      setSyncStatus("idle");
      saveLocal(o, w, ib||[]);
      if(cfgData && Object.keys(cfgData).length > 0){
        // Auto-migrate: add batchProjection if missing
        if(!cfgData.batchProjection){
          const migrated = { ...cfgData, batchProjection: DEFAULT_BATCH_PROMPT };
          const token = lsGet(LS_GIST_TOKEN);
          if(token) pushToConfigGist(token, migrated).catch(()=>null);
          setConfig(migrated);
          saveLocalConfig(migrated);
        } else {
          setConfig(cfgData);
          saveLocalConfig(cfgData);
        }
      } else {
        // Config Gist is empty — use local cache or null
        const localCfg = loadLocalConfig();
        if(localCfg) setConfig(localCfg);
      }
      showToast(`Synced — ${o.length} owned · ${w.length} wishlist · ${(ib||[]).length} inbox`, "success");
    }catch{
      const c = loadLocal();
      if(c){
        setOwned(c.owned); setWishlist(c.wishlist); setInbox(c.inbox||[]);
        setLastSynced(c.lastSaved);
        setSyncStatus("offline");
        const localCfg = loadLocalConfig();
        if(localCfg) setConfig(localCfg);
        showToast("Gist unreachable — local cache loaded", "warn");
      }else{
        setOwned([]); setWishlist([]); setInbox([]);
        setSyncStatus("offline");
        showToast("No cache available", "warn");
      }
    }finally{ setLoading(false); }
  }

  const saveConfig = async (newConfig) => {
    const token = lsGet(LS_GIST_TOKEN);
    if(!token){ showToast("No token — config not saved to Gist", "error"); return; }
    try{
      await pushToConfigGist(token, newConfig);
      setConfig(newConfig);
      saveLocalConfig(newConfig);
      showToast("Prompts saved to Gist", "success");
    }catch(e){
      showToast("Failed to save prompts: " + e.message, "error");
    }
  };

  const exportToXlsx = () => {
    try {
      const XLS = window.XLSX;
      const wb = XLS.utils.book_new();

      // Helper: parse M/D/YYYY date string → Excel serial number
      const toExcelDate = (str) => {
        if(!str) return "";
        const [m,d,y] = str.split("/").map(Number);
        if(!m||!d||!y) return str;
        const jsDate = new Date(y, m-1, d);
        // Excel serial: days since 1899-12-30
        return Math.floor((jsDate - new Date(1899,11,30)) / 86400000);
      };

      // Number format codes
      const FMT_DATE  = "mm/dd/yyyy";
      const FMT_GVI   = "0.000";
      const FMT_SCORE = "0.000";

      // ── SHEET 1: OWNED ──────────────────────────────────────────────────────
      // A=Title B=Platform C=Status D=Purchase Date E=Completed Date F=Price Paid
      // G=Hours Played H=Est Hours I=Difficulty
      // J=Gameplay K=Story L=Art M=Music/Sound N=Replay
      // O=Personal Rating P=Base GVI Q=Completion Adj R=Final GVI
      // S=Actual GVI (stored) T=GVI Delta U=Rating Delta
      // V=Proj Rating W=Proj GVI
      // X=Genres

      const ownedHeaders = [
        "Title","Platform","Status","Purchase Date","Completed Date","Price Paid",
        "Hours Played","Est Hours","Difficulty",
        "Gameplay","Story","Art","Music/Sound","Replay",
        "Personal Rating","Base GVI","Completion Adj","Final GVI",
        "Actual GVI","GVI Delta","Rating Delta",
        "Proj Rating","Proj GVI",
        "Genres"
      ];

      const ownedRows = owned.map((g, i) => {
        const row = i + 2;
        const C=`C${row}`, F=`F${row}`, G=`G${row}`, I=`I${row}`, O=`O${row}`, P=`P${row}`, Q=`Q${row}`;
        const J=`J${row}`, K=`K${row}`, L=`L${row}`, M=`M${row}`, N=`N${row}`;

        const personalRating = `IFERROR((${J}*0.35)+(${K}*0.25)+(${L}*0.20)+(${M}*0.15)+(${N}*0.05),"")`;
        const hoursComp      = `IF(${G}<=20,0.8,IF(${G}<=40,0.9,IF(${G}<=70,1.0,IF(${G}<=90,0.9,0.8))))*0.25`;
        const baseGVI        = `IFERROR((${O}/10*0.5)+(${hoursComp})+((70-MIN(70,MAX(0,${F})))/69*0.25),"")`;
        const compAdj        = `IFERROR(IF(${C}="Completed",${I}*0.01,IF(${C}="Abandoned",-(${I}*0.01),0)),"")`;
        const finalGVI       = `IFERROR(${P}+${Q},"")`;

        return [
          g.title || "",
          g.platform || "",
          g.status || "",
          toExcelDate(g.purchaseDate),
          toExcelDate(g.completionDate),
          g.price ?? "",
          g.hoursPlayed ?? "",
          g.estHours ?? "",
          g.difficulty ?? "",
          g.gameplay ?? "",
          g.story ?? "",
          g.art ?? "",
          g.musicSound ?? "",
          g.replay ?? "",
          { f: personalRating },
          { f: baseGVI },
          { f: compAdj },
          { f: finalGVI },
          g.actualGVI ?? "",
          g.gviDelta ?? "",
          g.ratingDelta ?? "",
          g.projRating ?? "",
          g.projGVI ?? "",
          (g.genres||[]).join(", "),
        ];
      });

      const ws1 = XLS.utils.aoa_to_sheet([ownedHeaders, ...ownedRows]);

      // Apply cell formats
      const numRows = owned.length;
      for(let i = 0; i < numRows; i++){
        const r = i + 2;
        // Date columns D, E (indices 3,4)
        ["D","E"].forEach(col => {
          const cell = ws1[`${col}${r}`];
          if(cell && cell.v !== "") { cell.t = "n"; cell.z = FMT_DATE; }
        });
        // GVI columns P,Q,R,S,T,U,W (indices 15-19,22) — 3 decimal
        ["P","Q","R","S","T","U","W"].forEach(col => {
          const cell = ws1[`${col}${r}`];
          if(cell) cell.z = FMT_GVI;
        });
        // Personal rating O and proj rating V — 3 decimal
        ["O","V"].forEach(col => {
          const cell = ws1[`${col}${r}`];
          if(cell) cell.z = FMT_SCORE;
        });
      }

      const ownedRef = `A1:X${numRows + 1}`;
      ws1["!autofilter"] = { ref: ownedRef };
      ws1["!tables"] = [{
        ref: ownedRef, name: "OwnedLibrary", displayName: "OwnedLibrary",
        headerRowCount: 1, totalsRowCount: 0,
        tableStyleInfo: { name: "TableStyleMedium2", showFirstColumn: false, showLastColumn: false, showRowStripes: true, showColumnStripes: false }
      }];
      ws1["!cols"] = [
        {wch:32},{wch:10},{wch:12},{wch:13},{wch:14},{wch:11},
        {wch:12},{wch:10},{wch:10},
        {wch:10},{wch:8},{wch:6},{wch:12},{wch:8},
        {wch:15},{wch:10},{wch:14},{wch:10},
        {wch:11},{wch:10},{wch:12},
        {wch:11},{wch:10},
        {wch:28}
      ];

      // ── SHEET 2: WISHLIST ────────────────────────────────────────────────────
      const wishHeaders = ["Title","Platform","Target Price","Proj Rating","Proj GVI","Genres","Deku Link"];
      const wishRows = wishlist.map(g => [
        g.title || "",
        g.platform || "",
        g.targetPrice ?? "",
        g.projRating ?? "",
        g.projGVI ?? "",
        (g.genres||[]).join(", "),
        g.dekuLink || "",
      ]);

      const ws2 = XLS.utils.aoa_to_sheet([wishHeaders, ...wishRows]);

      // Format proj rating + GVI columns
      for(let i = 0; i < wishlist.length; i++){
        const r = i + 2;
        ["D","E"].forEach(col => {
          const cell = ws2[`${col}${r}`];
          if(cell) cell.z = FMT_GVI;
        });
      }

      const wishRef = `A1:G${wishlist.length + 1}`;
      ws2["!autofilter"] = { ref: wishRef };
      ws2["!tables"] = [{
        ref: wishRef, name: "Wishlist", displayName: "Wishlist",
        headerRowCount: 1, totalsRowCount: 0,
        tableStyleInfo: { name: "TableStyleMedium2", showFirstColumn: false, showLastColumn: false, showRowStripes: true, showColumnStripes: false }
      }];
      ws2["!cols"] = [{wch:32},{wch:10},{wch:13},{wch:12},{wch:10},{wch:28},{wch:48}];

      XLS.utils.book_append_sheet(wb, ws1, "Owned");
      XLS.utils.book_append_sheet(wb, ws2, "Wishlist");

      const date = new Date().toISOString().slice(0,10);
      XLS.writeFile(wb, `gvi-library-${date}.xlsx`);
      showToast("Export complete", "success");
    } catch(e) {
      showToast("Export failed: " + e.message, "error");
    }
  };

  const saveQueue = useRef(Promise.resolve());
  const doSave = useCallback((o, w, ib, silent=false) => {
    // Support old 3-arg calls where ib was silent boolean
    if(typeof ib === "boolean"){ silent=ib; ib=inbox; }
    if(ib===undefined) ib=inbox;
    saveQueue.current = saveQueue.current.then(async () => {
      setSaving(true); setSyncStatus("saving");
      try{
        const token = lsGet(LS_GIST_TOKEN);
        if(token){
          await pushToGist(token, o, w, ib);
          setLastSynced(new Date().toISOString());
          setSyncStatus("idle");
          saveLocal(o, w, ib);
          if(!silent) showToast("Saved & synced", "success");
        }else{
          saveLocal(o, w, ib);
          setSyncStatus("offline");
          if(!silent) showToast("Saved locally", "warn");
        }
      }catch(e){
        saveLocal(o, w, ib);
        setSyncStatus("error");
        if(!silent) showToast("Gist failed — saved locally", "error");
      }finally{ setSaving(false); }
    });
    return saveQueue.current;
  }, [inbox]);

  async function handlePull(){
    setSyncStatus("saving");
    try{
      const { owned: o, wishlist: w, inbox: ib } = await fetchFromGist();
      setOwned(o); setWishlist(w); setInbox(ib||[]);
      setLastSynced(new Date().toISOString());
      setSyncStatus("idle");
      saveLocal(o, w, ib||[]);
      showToast(`Pulled — ${o.length} owned · ${w.length} wishlist`, "success");
    }catch(e){
      setSyncStatus("error");
      showToast("Pull failed: " + e.message, "error");
    }
  }

  function handleDisconnect(){
    if(!window.confirm("Disconnect this device? You'll need to re-enter credentials.")) return;
    lsDel(LS_GIST_TOKEN); lsDel(LS_ANTHROPIC_KEY);
    setNeedsSetup(true);
  }

  const handleBuy = (wi, price, purchaseDate) => {
    const e = {
      title:      wi.title,
      status:     "Not Started",
      platform:   wi.platform,
      purchaseDate: purchaseDate || today(),
      completionDate: "",
      estHours:   wi.estHours || null,
      hoursPlayed: 0,
      price:      price ?? 0,
      difficulty: null,
      gameplay:   null, story: null, art: null, musicSound: null, replay: null,
      projRating: wi.projRating  ?? null,
      projGVI:    wi.projGVI     ?? null,
      genres:     wi.genres      ?? [],
      notes:      wi.notes       || "",
      dekuLink:   wi.dekuLink    || "",
      personalRating: null, actualGVI: null, gviDelta: null, ratingDelta: null,
    };
    const no = [...owned, e], nw = wishlist.filter(w=>w.title!==wi.title);
    setOwned(no); setWishlist(nw); setSelectedWish(null);
    doSave(no, nw);
    showToast(`"${wi.title}" moved to Owned`, "success");
    setTab("owned");
  };

  const handleStarted = (g) => {
    const u = owned.map(x=>x.title===g.title?g:x);
    setOwned(u); setSelectedOwned(g);
    doSave(u, wishlist);
    showToast(`"${g.title}" marked In Progress`, "success");
  };

  const handleScore = (g) => {
    const u = owned.map(x=>x.title===g.title?g:x);
    setOwned(u); setSelectedOwned(g);
    doSave(u, wishlist);
    const v = g.status==="Completed"?"Completed":g.status==="Abandoned"?"Abandoned":"Scored";
    showToast(`${v} "${g.title}" — GVI ${gviLabel(g.actualGVI)}`, "success");
  };

  const handleAddWish = (item) => {
    const nw = [...wishlist, item];
    setWishlist(nw); doSave(owned, nw);
    showToast(`"${item.title}" added to wishlist`, "success");
  };

  const handleProjectionSave = (updates) => {
    const item = projectionModal?.game; if(!item) return;
    const { copyNote, ...rest } = updates;
    const updated = { ...item, ...rest };
    const nw = wishlist.map(w=>w.title===item.title?updated:w);
    setWishlist(nw); setSelectedWish(updated); setProjectionModal(null);
    doSave(owned, nw).then(()=>showToast(`Saved — ${item.title}: Rating ${updates.projRating?.toFixed(2)} / GVI ${updates.projGVI?.toFixed(3)}`, "success"));
  };

  const handleOwnedProjectionSave = (updates) => {
    const item = projectionModal?.game; if(!item) return;
    const { copyNote, ...rest } = updates;
    const updated = { ...item, ...rest };
    const no = owned.map(g=>g.title===item.title?updated:g);
    setOwned(no); setSelectedOwned(updated); setProjectionModal(null);
    doSave(no, wishlist).then(()=>showToast(`Saved — ${item.title}: Rating ${updates.projRating?.toFixed(2)} / GVI ${updates.projGVI?.toFixed(3)}`, "success"));
  };

  const handleKpiClick = (action) => {
    if(action==="owned")     { setTab("owned");    setOwnedFilter("All"); }
    if(action==="wishlist")  { setTab("wishlist"); }
    if(action==="completed") { setTab("owned");    setOwnedFilter("Completed"); }
    if(action==="inprogress"){ setTab("owned");    setOwnedFilter("In Progress"); }
    setSelectedOwned(null); setSelectedWish(null);
  };

  const handleDekuSync = (stubs) => {
    const existingTitles = new Set([...inbox, ...wishlist, ...owned].map(g => normalizeTitle(g.title)));
    const existingUrls = new Set([...inbox, ...wishlist, ...owned].map(g => g.dekuLink).filter(Boolean));
    const newStubs = stubs.filter(s => !existingTitles.has(normalizeTitle(s.title)) && !existingUrls.has(s.dekuLink));
    const ni = [...inbox, ...newStubs];
    setInbox(ni); doSave(owned, wishlist, ni);
    showToast(`${newStubs.length} new stub${newStubs.length===1?"":"s"} added to Inbox${stubs.length-newStubs.length>0?` · ${stubs.length-newStubs.length} duplicates skipped`:""}`, "success");
  };

  const handleAutoTag = (tagMap) => {
    const u = owned.map(g=>tagMap[g.title]!=null?{...g,genres:tagMap[g.title]}:g);
    const w = wishlist.map(g=>tagMap[g.title]!=null?{...g,genres:tagMap[g.title]}:g);
    setOwned(u); setWishlist(w); doSave(u,w);
    setAutoTagModal(false);
    showToast(`Tagged ${Object.values(tagMap).filter(v=>v?.length>0).length} games`, "success");
  };

  const handleBatchRating = (updates) => {
    const u = owned.map(g=>updates[g.title]!=null?{...g,projRating:updates[g.title]}:g);
    setOwned(u); doSave(u, wishlist);
    setBatchRatingModal(false);
    showToast(`Updated ${Object.keys(updates).length} proj ratings`, "success");
  };

  const handleImport = (no, nw) => {
    setOwned(no); setWishlist(nw);
    setSelectedOwned(null); setSelectedWish(null); setDataModal(false);
    doSave(no, nw);
    showToast(`Restored: ${no.length} owned + ${nw.length} wishlist`, "success");
  };

  if(needsSetup) return <SetupScreen onComplete={()=>{ setNeedsSetup(false); boot(); }}/>;

  if(loading) return (
    <div style={{ minHeight:"100vh", background:"#060e1e", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"monospace", color:"#94a3b8", letterSpacing:2 }}>
      SYNCING FROM GIST…
    </div>
  );

  const si = syncStatus==="saving" ? { c:"#facc15", label:"SYNCING…", pulse:true }
           : syncStatus==="error"  ? { c:"#f87171", label:"SYNC ERROR", pulse:false }
           : syncStatus==="offline"? { c:"#fb923c", label:"OFFLINE",    pulse:false }
           :                         { c:"#4ade80", label:"GIST SYNCED", pulse:false };

  return (
    <div style={{ minHeight:"100vh", background:"#060e1e", fontFamily:"'Inter',system-ui,sans-serif", color:"#e2e8f0" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        *{box-sizing:border-box}
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:#0a1628}
        ::-webkit-scrollbar-thumb{background:#334155;border-radius:3px}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        tr:hover>td{background:rgba(124,58,237,0.04)!important}
      `}</style>

      {/* HEADER */}
      <div style={{ borderBottom:"1px solid #1e293b", padding:"13px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:8 }}>
        <div>
          <div style={{ fontSize:9, letterSpacing:2, fontFamily:"'JetBrains Mono',monospace", fontWeight:700, color:"#a78bfa", marginBottom:1 }}>GAME VALUE INDEX</div>
          <div style={{ fontSize:18, fontWeight:700, letterSpacing:-0.3 }}>LIBRARY TRACKER</div>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
          {lastSynced && (
            <div style={{ fontSize:9, fontFamily:"'JetBrains Mono',monospace", color:"#64748b", textAlign:"right", lineHeight:1.7 }}>
              <div>{owned.length} OWNED · {wishlist.length} WISHLIST</div>
              <div>SYNCED {new Date(lastSynced).toLocaleTimeString()}</div>
            </div>
          )}
          <Btn variant="ghost" size="sm" onClick={()=>setConfigModal(true)}>⚙ PROMPTS</Btn>
          <Btn variant="ghost" size="sm" onClick={exportToXlsx}>⬇ EXCEL</Btn>
          <Btn variant="ghost" size="sm" onClick={handlePull} disabled={syncStatus==="saving"}>⟳ PULL</Btn>
          <Btn variant="warn" size="sm" onClick={()=>setDataModal(true)}>⇓ BACKUP</Btn>
          <div onClick={handleDisconnect} title="Click to disconnect" style={{ display:"flex", alignItems:"center", gap:5, padding:"4px 10px", border:`1px solid ${si.c}44`, borderRadius:3, fontSize:9, color:si.c, cursor:"pointer" }}>
            <div style={{ width:5, height:5, borderRadius:"50%", background:si.c, animation:si.pulse?"pulse 1s infinite":"none" }}/>
            {si.label}
          </div>
        </div>
      </div>

      {/* BODY */}
      <div style={{ padding:"16px 24px" }}>
        <StatsBar owned={owned} wishlist={wishlist} onKpiClick={handleKpiClick}/>
        {(() => {
          const gapCount = [
            ...owned.filter(g => {
              const needsProj = (g.status==="In Progress"||g.status==="Not Started") && !g.projRating;
              const needsNote = !g.notes?.trim();
              const needsHours = (g.status==="In Progress"||g.status==="Not Started") && !g.estHours;
              return needsProj || needsNote || needsHours;
            }),
            ...wishlist.filter(g => !g.projRating || !g.notes?.trim() || !g.targetPrice || !g.platform),
          ].length;
          return (
            <TabBar
              tabs={[
                {key:"owned",label:"OWNED"},
                {key:"wishlist",label:"WISHLIST"},
                {key:"inbox", label:inbox.length>0?`INBOX (${inbox.length})`:"INBOX", accent:inbox.length>0?"#fb923c":undefined},
                {key:"report",label:"REPORT"},
                {key:"insights",label:"INSIGHTS"},
                {key:"gaps", label:gapCount>0?`DATA GAPS (${gapCount})`:"DATA GAPS", accent:gapCount>0?"#fb923c":undefined},
              ]}
              active={tab}
              onChange={t=>{ setTab(t); setSelectedOwned(null); setSelectedWish(null); }}
            />
          );
        })()}

        {tab==="owned" && (
          <>
            <div style={{ display:"flex", justifyContent:"flex-end", gap:8, marginBottom:12 }}>
              <Btn variant="ghost" size="sm" onClick={()=>setAutoTagModal(true)}>✦ AUTO-TAG GENRES</Btn>
              <Btn variant="ghost" size="sm" onClick={()=>setBatchRatingModal(true)}>✦ BATCH PROJ RATINGS</Btn>
              <Btn variant="ghost" size="sm" onClick={()=>setTab("wishlist")}>← WISHLIST</Btn>
            </div>
            <OwnedTable
              games={owned}
              onSelect={g=>setSelectedOwned(selectedOwned?.title===g?.title?null:g)}
              selected={selectedOwned}
              sortKey={ownedSortKey} sortDir={ownedSortDir}
              onSortChange={(k,d)=>{setOwnedSortKey(k);setOwnedSortDir(d);}}
              filterStatus={ownedFilter} onFilterStatusChange={setOwnedFilter}
            />
            <Drawer open={!!selectedOwned} onClose={()=>setSelectedOwned(null)}>
              {selectedOwned && (
              <OwnedDetail
                g={selectedOwned}
                onClose={()=>setSelectedOwned(null)}
                onScore={()=>setScoreModal({game:selectedOwned, initialStatus:selectedOwned.status==="Not Started"?"Completed":selectedOwned.status})}
                onStart={()=>setStartedModal(selectedOwned)}
                onSaveNote={note=>{ const u=owned.map(g=>g.title===selectedOwned.title?{...g,notes:note}:g); setOwned(u); setSelectedOwned({...selectedOwned,notes:note}); doSave(u,wishlist); }}
                onSaveGenre={genres=>{ const u=owned.map(g=>g.title===selectedOwned.title?{...g,genres}:g); setOwned(u); setSelectedOwned({...selectedOwned,genres}); doSave(u,wishlist); }}
                onSaveField={fields=>{ const u=owned.map(g=>g.title===selectedOwned.title?{...g,...fields}:g); setOwned(u); setSelectedOwned({...selectedOwned,...fields}); doSave(u,wishlist); }}
                onProject={()=>setProjectionModal({game:selectedOwned,source:"owned"})}
              />
              )}
            </Drawer>
          </>
        )}

        {tab==="wishlist" && (
          <>
            <div style={{ display:"flex", gap:8, marginBottom:12, justifyContent:"flex-end" }}>
              <Btn variant="primary" size="sm" onClick={()=>setAddWishModal(true)}>+ ADD ENTRY</Btn>
            </div>
            <WishlistTable
              items={wishlist}
              onSelect={g=>setSelectedWish(selectedWish?.title===g?.title?null:g)}
              selected={selectedWish}
              sortKey={wishSortKey} sortDir={wishSortDir}
              onSortChange={(k,d)=>{setWishSortKey(k);setWishSortDir(d);}}
            />
            <Drawer open={!!selectedWish} onClose={()=>setSelectedWish(null)}>
              {selectedWish && (
              <WishlistDetail
                g={selectedWish}
                onClose={()=>setSelectedWish(null)}
                onBuy={handleBuy}
                onProject={item=>setProjectionModal({game:item,source:"wishlist"})}
                onDelete={item=>{ const u=wishlist.filter(g=>g.title!==item.title); setWishlist(u); setSelectedWish(null); doSave(owned,u); showToast(`"${item.title}" removed from wishlist`, "success"); }}
                onSaveGenre={genres=>{ const u=wishlist.map(g=>g.title===selectedWish.title?{...g,genres}:g); setWishlist(u); setSelectedWish({...selectedWish,genres}); doSave(owned,u); }}
                onSaveField={fields=>{ const u=wishlist.map(g=>g.title===selectedWish.title?{...g,...fields}:g); setWishlist(u); setSelectedWish({...selectedWish,...fields}); doSave(owned,u); }}
              />
              )}
            </Drawer>
          </>
        )}

        {tab==="report" && <ReportTab owned={owned} wishlist={wishlist} config={config} onSaveConfig={saveConfig}/>}
        {tab==="insights" && <InsightsTab owned={owned} wishlist={wishlist}/>}
        {tab==="inbox" && (
          <InboxTab
            inbox={inbox}
            config={config}
            onDekuSync={()=>setDekuModal(true)}
            results={inboxResults} setResults={setInboxResults}
            phase={inboxPhase} setPhase={setInboxPhase}
            progress={inboxProgress} setProgress={setInboxProgress}
            onGraduate={(graduated, discarded) => {
              const nw = [...wishlist, ...graduated];
              const ni = inbox.filter(g => !graduated.find(k=>k.title===g.title) && !discarded.find(k=>k.title===g.title));
              setWishlist(nw); setInbox(ni); doSave(owned, nw, ni);
              setInboxResults({}); setInboxPhase("idle"); setInboxProgress(0);
              showToast(`${graduated.length} moved to Wishlist · ${discarded.length} discarded`, "success");
            }}
          />
        )}
        {tab==="gaps" && (
          <DataGapsTab
            owned={owned}
            wishlist={wishlist}
            onSaveOwned={(title, fields) => {
              const u = owned.map(g => g.title===title ? {...g,...fields} : g);
              setOwned(u); doSave(u, wishlist);
            }}
            onSaveWishlist={(title, fields) => {
              const u = wishlist.map(g => g.title===title ? {...g,...fields} : g);
              setWishlist(u); doSave(owned, u);
            }}
            onProject={(game, source) => setProjectionModal({game, source})}
          />
        )}

        <div style={{ marginTop:14, padding:"8px 12px", background:"#0a1628", border:"1px solid #1e293b", borderRadius:4, fontSize:9, letterSpacing:1, display:"flex", gap:20, flexWrap:"wrap", alignItems:"center" }}>
          <span style={{ color:"#334155" }}>GIST: {GIST_ID.slice(0,12)}…</span>
          <span style={{ marginLeft:"auto", color:"#a78bfa" }}>GVI LIBRARY TRACKER v9 — GIST SYNC + REPORT + INSIGHTS</span>
        </div>
      </div>

      {/* MODALS */}
      {configModal && <EditPromptsModal config={config} defaultProjection={DEFAULT_PROJECTION_PROMPT} onSave={cfg=>{saveConfig(cfg);setConfigModal(false);}} onClose={()=>setConfigModal(false)}/>}
      {scoreModal && <ScoreModal game={scoreModal.game} initialStatus={scoreModal.initialStatus} onSave={handleScore} onClose={()=>setScoreModal(null)}/>}
      {startedModal && <StartedModal game={startedModal} onSave={handleStarted} onClose={()=>setStartedModal(null)}/>}
      {addWishModal && <AddWishlistModal existingTitles={wishlist.map(w=>w.title)} onSave={handleAddWish} onClose={()=>setAddWishModal(false)}/>}
      {dekuModal && <DekuSyncModal currentWishlist={wishlist} onSync={handleDekuSync} onClose={()=>setDekuModal(false)}/>}
      {projectionModal && <ProjectionModal game={projectionModal.game} onSave={projectionModal.source==="owned"?handleOwnedProjectionSave:handleProjectionSave} onClose={()=>setProjectionModal(null)} config={config}/>}
      {autoTagModal && <AutoTagModal owned={owned} wishlist={wishlist} onSave={handleAutoTag} onClose={()=>setAutoTagModal(false)}/>}
      {batchRatingModal && <BatchRatingModal owned={owned} onSave={handleBatchRating} onClose={()=>setBatchRatingModal(false)}/>}
      {dataModal && <DataModal owned={owned} wishlist={wishlist} onImport={handleImport} onClose={()=>setDataModal(false)}/>}
      {toast && <Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
