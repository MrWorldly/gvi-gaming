function calcPersonalRating(g, i, a, m, r) {
  return (g*0.35)+(i*0.25)+(a*0.20)+(m*0.15)+(r*0.05);
}
function hoursBand(h) {
  if (h<=20) return 0.80; if (h<=40) return 0.90;
  if (h<=70) return 1.00; if (h<=90) return 0.90; return 0.80;
}
function calcGVI(gameplay, story, art, musicSound, replay, hoursPlayed, price, status, difficulty) {
  const pr = calcPersonalRating(gameplay, story, art, musicSound, replay);
  const ratingsComp = (pr/10)*0.50;
  const hoursComp = hoursBand(hoursPlayed)*0.25;
  const priceComp = ((70-Math.min(70,Math.max(0,price)))/69)*0.25;
  const baseGVI = ratingsComp+hoursComp+priceComp;
  const adj = difficulty*0.01;
  const completionAdj = status==="Completed"?adj:status==="Abandoned"?-adj:0;
  const finalGVI = baseGVI+completionAdj;
  return { personalRating:pr, ratingsComp, hoursComp, priceComp, baseGVI, completionAdj, finalGVI };
}

const PROJECTION_SYSTEM_PROMPT = `You are a gaming advisor generating a projected enjoyment note for a specific player profile. Your job is to assess a game and return structured JSON.

## PLAYER PROFILE

**Player Type**: ISTJ \u2014 Goal-oriented, completion-driven, efficiency-focused. 30+ years old, experienced gamer since NES era.

**Strong Preferences:**
- Systems-driven combat, momentum-based gameplay, strong early hooks
- Flexible playstyles, fair difficulty, strategic depth (buildcrafting, preparation)
- Adult tone and restraint, extensive voice acting, earned emotional weight
- Modern visuals, 7.1 surround sound, stable framerates
- Sweet spot: 40\u201370 hours. Acceptable: 20\u201390h. Caution: 100h+
- Nintendo cartoon exception: world-class execution overrides tone (Mario, Luigi's Mansion confirmed)
- Beloved IP exception: Star Wars confirmed; apply cautiously

**Hard Dealbreakers:**
- Slow burn openings (5h+ to hook), trial-and-error design, punitive stealth (instant-fail)
- Execution-heavy difficulty (frame-perfect), forced playstyles, excessive grinding, heavy micromanagement
- Positional/grid combat (exceptions for very deep systems), roguelikes (philosophical objection)
- Heavy anime energy, juvenile tone (with Nintendo/IP exceptions), caption-dense delivery without voice acting

Personal Rating = (Gameplay\u00d70.35)+(Story\u00d70.25)+(Art\u00d70.20)+(MusicSound\u00d70.15)+(Replay\u00d70.05)
Hours bands: 1-20h=0.80, 21-40h=0.90, 41-70h=1.00, 71-90h=0.90, 91h+=0.80
Base GVI = (PersonalRating/10\u00d70.50) + (band\u00d70.25) + ((70-price)/69\u00d70.25)
Final GVI = Base GVI + (difficulty\u00d70.01 if Completed, -difficulty\u00d70.01 if Abandoned, +0 if In Progress)

Total est remaining hours across all in-progress. Which to abandon (name, rating delta, remaining hours) \u2014 only if <75% complete AND >5h remaining. Overperformers and by how much. Unresolved platform decisions with consequential runtime.
### GVI Formula \u2014 What It Measures and Where to Be Careful
Every report: For completed/in-progress GVI is correct primary metric. For wishlist, projected personal rating is primary. GVI overstated = name each game <$8, show GVI + proj rating. GVI understated = runtime <20h, add 0.05\u20130.10 mentally, list by name.
### Genre Calibration Signal
Both signals every report: Arena shooter/momentum-rewarding = confirmed underweighted, bump projections. Restriction-first/stealth-adjacent = confirmed overweighted, carry abandonment risk flags.
### Wishlist Data Quality
Count missing projected personal ratings. State number and %. Name them. Flag as data quality problem. Call out high-GVI games in this group specifically.
### Additional Insights
1\u20133 sharp data-driven observations not obvious from raw numbers.

## Section 2 \u2014 Current Play Recommendations

## Section 6 \u2014 Genre Analysis

## Section 7 \u2014 Platform Trends
Table: Platform | Owned | Completed | In Progress | Wishlist Targets

const GIST_ID="4c0053356a06460c57e3e54dd83b4f2b";
const GIST_FILENAME="gvi-library.json";
const GIST_RAW=`https://gist.githubusercontent.com/MrWorldly/${GIST_ID}/raw/${GIST_FILENAME}`;
const GIST_API=`https://api.github.com/gists/${GIST_ID}`;
const LS_GIST_TOKEN="gvi-gist-token";
const LS_ANTHROPIC_KEY="gvi-anthropic-key";

function lsGet(k){try{return localStorage.getItem(k);}catch{return null;}}
function lsSet(k,v){try{localStorage.setItem(k,v);}catch{}}
function lsDel(k){try{localStorage.removeItem(k);}catch{}}
function lsGetRaw(k){try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch{return null;}}

async function fetchFromGist(){
  const r=await fetch(`${GIST_RAW}?cb=${Date.now()}`);
  if(!r.ok)throw new Error(`Gist ${r.status}`);
  const d=await r.json();
  return{owned:d.owned||d.games||[],wishlist:d.wishlist||[]};
}
async function pushToGist(token,owned,wishlist){
  const body=JSON.stringify({exportedAt:new Date().toISOString(),version:"gvi-v1",owned,wishlist});
  const r=await fetch(GIST_API,{method:"PATCH",
    headers:{"Authorization":`token ${token}`,"Content-Type":"application/json","Accept":"application/vnd.github.v3+json"},
    body:JSON.stringify({files:{[GIST_FILENAME]:{content:body}}})
  });
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(`GitHub ${r.status}: ${e.message||r.statusText}`);}
}
function saveLocal(owned,wishlist){
  const ts=new Date().toISOString();
  lsSet(OWNED_KEY,JSON.stringify({games:owned,lastSaved:ts}));
  lsSet(WISHLIST_KEY,JSON.stringify({games:wishlist,lastSaved:ts}));
}
function loadLocal(){
  try{
    const o=lsGet(OWNED_KEY),w=lsGet(WISHLIST_KEY);
    if(o&&w){const op=JSON.parse(o),wp=JSON.parse(w);return{owned:op.games,wishlist:wp.games,lastSaved:op.lastSaved};}
  }catch{}
