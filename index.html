// ─── GVI FORMULA ─────────────────────────────────────────────────────────────
function calcPersonalRating(g, i, a, m, r) {
return (g*0.35)+(i*0.25)+(a*0.20)+(m*0.15)+(r*0.05);
}
function hoursBand(h) {
if (h<=20) return 0.80; if (h<=40) return 0.90;
if (h<=70) return 1.00; if (h<=90) return 0.90; return 0.80;
}
function calcGVI(gameplay, story, art, musicSound, replay, hoursPlayed, price, status, difficulty) {
const pr = calcPersonalRating(gameplay, story, art, musicSound, replay);
const ratingsComp = (pr/10)*0.50;
const hoursComp = hoursBand(hoursPlayed)*0.25;
const priceComp = ((70-Math.min(70,Math.max(0,price)))/69)*0.25;
const baseGVI = ratingsComp+hoursComp+priceComp;
const adj = difficulty*0.01;
const completionAdj = status===“Completed”?adj:status===“Abandoned”?-adj:0;
const finalGVI = baseGVI+completionAdj;
return { personalRating:pr, ratingsComp, hoursComp, priceComp, baseGVI, completionAdj, finalGVI };
}

function gviColor(v){if(v==null)return”#475569”;if(v>=0.9)return”#a78bfa”;if(v>=0.8)return”#4ade80”;if(v>=0.7)return”#facc15”;if(v>=0.6)return”#fb923c”;return”#f87171”;}

function fmtDelta(v){if(v==null)return”—”;return(v>=0?”+”:””)+v.toFixed(3);}

function Sel({value,onChange,options}){

const variants={primary:{bg:”#7c3aed”,border:”#7c3aed”,color:”#fff”},ghost:{bg:“transparent”,border:”#334155”,color:”#94a3b8”},danger:{bg:“rgba(248,113,113,0.12)”,border:”#f87171”,color:”#f87171”},success:{bg:“rgba(74,222,128,0.12)”,border:”#4ade80”,color:”#4ade80”},warn:{bg:“rgba(250,204,21,0.12)”,border:”#facc15”,color:”#facc15”}};
const v=variants[variant]||variants.primary;
const pad=size===“sm”?“3px 9px”:“7px 16px”;
return <button onClick={disabled?undefined:onClick} disabled={disabled} style={{padding:pad,borderRadius:3,cursor:disabled?“not-allowed”:“pointer”,fontSize:size===“sm”?10:11,fontFamily:”‘Courier Prime’,monospace”,letterSpacing:1.5,background:v.bg,border:`1px solid ${v.border}`,color:v.color,opacity:disabled?0.45:1,transition:“all 0.15s”}}>{children}</button>;
}

function RatingBar({v}){

const pct=(v/10)*100,col=v>=8.5?”#a78bfa”:v>=7?”#4ade80”:v>=5?”#facc15”:”#f87171”;

function Toast({msg,type}){
if(!msg)return null;
const col=type===“error”?”#f87171”:type===“warn”?”#facc15”:”#4ade80”;
return <div style={{position:“fixed”,bottom:24,right:24,zIndex:300,background:”#0f172a”,border:`1px solid ${col}`,padding:“10px 16px”,borderRadius:4,fontFamily:“monospace”,fontSize:12,color:col,letterSpacing:1,boxShadow:`0 0 24px ${col}33`,animation:“fadeIn 0.2s ease”,maxWidth:360}}>{msg}</div>;

const PROJECTION_SYSTEM_PROMPT = `You are a gaming advisor generating a projected enjoyment note for a specific player profile. Your job is to assess a game and return structured JSON.

## PLAYER PROFILE

**Player Type**: ISTJ — Goal-oriented, completion-driven, efficiency-focused. 30+ years old, experienced gamer since NES era.

**Strong Preferences:**

- Systems-driven combat, momentum-based gameplay, strong early hooks

- Sweet spot: 40–70 hours. Acceptable: 20–90h. Caution: 100h+
- Nintendo cartoon exception: world-class execution overrides tone (Mario, Luigi’s Mansion confirmed)
- Beloved IP exception: Star Wars confirmed; apply cautiously

**Hard Dealbreakers:**

- Slow burn openings (5h+ to hook), trial-and-error design, punitive stealth (instant-fail)
- Execution-heavy difficulty (frame-perfect), forced playstyles, excessive grinding, heavy micromanagement
- Positional/grid combat (exceptions for very deep systems), roguelikes (philosophical objection)
- Heavy anime energy, juvenile tone (with Nintendo/IP exceptions), caption-dense delivery without voice acting
- Contrived premises (modern setting + JRPG mechanics grafted on), bishōnen/androgynous male protagonists

**Genre Compatibility:**

- High (70–90%): Metroidvanias, Action-Adventures, Action RPGs, Soulslike (with builds/summons)
- Medium (40–70%): Turn-based RPGs (deep systems + adult tone + voice acting required), Tactical RPGs (systems-driven only), CRPGs (story-driven, flexible combat)
- Low (<40%): Roguelikes (0%), Execution Platformers (10–30%), Live Service, Simulation Sports, Sandbox/Crafting

**Calibration signals:**

- Arena shooter / momentum-rewarding / empowerment-first design: CONFIRMED UNDERWEIGHTED — bump projections up for this DNA
- Restriction-first / stealth-adjacent / resource scarcity design: CONFIRMED OVERWEIGHTED — flag abandonment risk
- DOOM 2016: +0.249 GVI delta (largest positive variance ever), largest surprise on record
- Death’s Door = maximum tolerable execution difficulty
- Hades: completed via God Mode after 47 attempts — roguelikes are fundamentally incompatible

**Documented Lesson — Enable Accessibility Immediately:**
Always recommend enabling God Mode, Story Mode, easy difficulty, summons — any accessibility feature addressing a known friction point. No guilt.

**Projection Rating Scale Rules:**

- Use the FULL 1.0–10.0 scale. Do NOT anchor to a safe midpoint.
- A game hitting 1–2 hard dealbreakers with few positives: project 3.0–5.0
- A game hitting 3+ hard dealbreakers or confirmed incompatible genre: project 1.5–3.5
- A game with no dealbreakers but weak genre fit: project 5.0–6.5

- Always state the anchoring logic in the enjoyment note.

You MUST return ONLY valid JSON, no markdown, no explanation, no preamble. The JSON must have exactly these fields:

{
“projectedRating”: <number 1.0–10.0, one decimal place>,

function calcProjGVI(projRating, price, hours){
const ratingsComp=(projRating/10)*0.50;
const band=hours<=20?0.80:hours<=40?0.90:hours<=70?1.00:hours<=90?0.90:0.80;
const hoursComp=band*0.25;
const priceComp=((70-Math.min(70,Math.max(0,price)))/69)*0.25;
return ratingsComp+hoursComp+priceComp;
}

if(!h)return”—”;

const GIST_ID = “4c0053356a06460c57e3e54dd83b4f2b”;
const GIST_FILENAME = “gvi-library.json”;
const GIST_RAW_URL = `https://gist.githubusercontent.com/MrWorldly/${GIST_ID}/raw/${GIST_FILENAME}`;
const GIST_API_URL = `https://api.github.com/gists/${GIST_ID}`;
const LS_GIST_TOKEN = “gvi-gist-token”;
const LS_ANTHROPIC_KEY = “gvi-anthropic-key”;
const LS_OWNED = “gvi-owned-v1”;
const LS_WISHLIST = “gvi-wishlist-v1”;

// ─── LOCAL STORAGE HELPERS ────────────────────────────────────────────────────
function lsGet(key){ try{ return localStorage.getItem(key); }catch{ return null; } }
function lsSet(key,val){ try{ localStorage.setItem(key,val); }catch{} }
function lsDel(key){ try{ localStorage.removeItem(key); }catch{} }

// ─── GIST SYNC UTILITIES ──────────────────────────────────────────────────────
async function fetchFromGist(){
const url = `${GIST_RAW_URL}?cb=${Date.now()}`;
const res = await fetch(url);
if(!res.ok) throw new Error(`Gist fetch failed: ${res.status} ${res.statusText}`);
const parsed = await res.json();
return {
owned: parsed.owned || parsed.games || [],
wishlist: parsed.wishlist || [],
exportedAt: parsed.exportedAt || null
};
}

async function pushToGist(token, owned, wishlist){
const payload = { exportedAt: new Date().toISOString(), version: “gvi-v1”, owned, wishlist };
const res = await fetch(GIST_API_URL, {
method: “PATCH”,
headers: {
“Authorization”: `token ${token}`,
“Content-Type”: “application/json”,
“Accept”: “application/vnd.github.v3+json”,
},
body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(payload, null, 2) } } })
});
if(!res.ok){
const err = await res.json().catch(()=>({}));
throw new Error(`GitHub API ${res.status}: ${err.message || res.statusText}`);
}
return true;
}

function saveLocalCache(owned, wishlist){
const ts = new Date().toISOString();
lsSet(LS_OWNED, JSON.stringify({ games: owned, lastSaved: ts }));
lsSet(LS_WISHLIST, JSON.stringify({ games: wishlist, lastSaved: ts }));
}

function loadLocalCache(){
try{
const od = lsGet(LS_OWNED);
const wd = lsGet(LS_WISHLIST);
if(od && wd){
const o = JSON.parse(od);
const w = JSON.parse(wd);
return { owned: o.games, wishlist: w.games, lastSaved: o.lastSaved };
}
}catch{}
return null;
}

function App(){

const [lastSynced, setLastSynced] = useState(null);

const [dataModal, setDataModal] = useState(false);

const [gistToken, setGistToken] = useState(null);
const [anthropicKey, setAnthropicKey] = useState(null);

const showToast = (msg, type=“success”) => { setToast({msg,type}); setTimeout(()=>setToast(null),4000); };

// ── Boot ────────────────────────────────────────────────────────────────────
useEffect(()=>{
const gt = lsGet(LS_GIST_TOKEN);
const ak = lsGet(LS_ANTHROPIC_KEY);
if(!gt || !ak){
setNeedsSetup(true);
setLoading(false);
return;
}
setGistToken(gt);
setAnthropicKey(ak);
bootLoad(gt);
}, []);

async function bootLoad(token){
setLoading(true);
try{
const { owned: o, wishlist: w, exportedAt } = await fetchFromGist();
setOwned(o); setWishlist(w);
setLastSynced(exportedAt || new Date().toISOString());
setSyncStatus(“idle”);
saveLocalCache(o, w);
showToast(`Synced — ${o.length} owned · ${w.length} wishlist`, “success”);
}catch(gistErr){
const cache = loadLocalCache();
if(cache){
setOwned(cache.owned); setWishlist(cache.wishlist);
setLastSynced(cache.lastSaved);
setSyncStatus(“offline”);
showToast(“Gist unreachable — using local cache”, “warn”);
}else{
setOwned(OWNED_SEED); setWishlist(WISHLIST_SEED);
setSyncStatus(“offline”);
showToast(“No cache — loaded seed data”, “warn”);
}
}finally{ setLoading(false); }
}

function handleSetupComplete(gt, ak){
setGistToken(gt); setAnthropicKey(ak);
setNeedsSetup(false);
bootLoad(gt);
}

// ── Save ────────────────────────────────────────────────────────────────────
const saveQueue = useRef(Promise.resolve());
const doSave = useCallback((o, w, silent=false) => {
saveQueue.current = saveQueue.current.then(async () => {
setSaving(true); setSyncStatus(“saving”);
try{
const token = lsGet(LS_GIST_TOKEN);
if(token){
await pushToGist(token, o, w);
setLastSynced(new Date().toISOString());
setSyncStatus(“idle”);
saveLocalCache(o, w);
if(!silent) showToast(“Saved & synced to Gist”, “success”);
}else{
saveLocalCache(o, w);
setSyncStatus(“offline”);
if(!silent) showToast(“Saved locally (no token)”, “warn”);
}
}catch(e){
saveLocalCache(o, w);
setSyncStatus(“error”);
if(!silent) showToast(“Gist failed — saved locally: “ + (e?.message||“unknown”), “error”);
}finally{ setSaving(false); }
});
return saveQueue.current;
}, []);

// ── Manual pull ─────────────────────────────────────────────────────────────
async function handleManualSync(){
const token = lsGet(LS_GIST_TOKEN);
if(!token){ showToast(“No token — re-run setup”, “error”); return; }
setSyncStatus(“saving”);
try{
const { owned: o, wishlist: w, exportedAt } = await fetchFromGist();
setOwned(o); setWishlist(w);
setLastSynced(exportedAt || new Date().toISOString());
setSyncStatus(“idle”);
saveLocalCache(o, w);
showToast(`Pulled — ${o.length} owned · ${w.length} wishlist`, “success”);
}catch(e){
setSyncStatus(“error”);
showToast(“Sync failed: “ + e.message, “error”);
}
}
